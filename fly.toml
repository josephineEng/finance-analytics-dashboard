app = "finance-analytics"

[build]
  builder = "heroku/buildpacks:python"

[env]
  PYTHON_VERSION = "3.11"

[[services]]
  protocol = "tcp"
  internal_port = 8000
  
  [[services.ports]]
    port = 80
    handlers = ["http"]
    
  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

[processes]
  app = "gunicorn --chdir app app:app"
